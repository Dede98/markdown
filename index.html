<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Markdown Editor</title>
    <!--
      Resolve and apply the user's theme before first paint to avoid a flash.
      Mirrors `src/theme.ts` — keep the storage key and resolution rules in sync.
    -->
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem("markdown.theme");
          var pref = stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
          var resolved =
            pref === "system"
              ? window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : pref;
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
        // Mark the document as the Tauri shell before first paint. macOS also
        // gets a platform marker so CSS can reserve space for the traffic-light
        // overlay without shifting Windows/Linux chrome.
        if (window.__TAURI_INTERNALS__ || window.__TAURI__) {
          document.documentElement.setAttribute("data-tauri", "1");
          if (/mac|iphone|ipad/i.test(window.navigator.platform || window.navigator.userAgent || "")) {
            document.documentElement.setAttribute("data-tauri-platform", "macos");
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
