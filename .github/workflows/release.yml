# Release workflow for the Tauri native desktop builds.
#
# Trigger: pushing a `v*` tag (e.g. `v0.0.16`, `v1.0.0`). Tauri-action
# reads the tag, builds native bundles for macOS, Windows, and Linux,
# signs the update payloads with the libsodium key in
# `TAURI_SIGNING_PRIVATE_KEY`, generates `latest.json` (the updater
# manifest), and uploads everything as assets on a *draft* GitHub release.
# Publishing the release is a manual step in the GitHub UI so a stray tag
# never auto-ships.
#
# The matching public key is baked into `src-tauri/tauri.conf.json` and
# the running app uses it to verify the signature before swapping the
# binary.
#
# Platform code-signing certificates and notarization are intentionally out
# of scope for this workflow. First-launch users can see trust prompts
# (macOS Gatekeeper, Windows SmartScreen / unknown publisher). The Tauri
# updater payload signing is separate and remains enabled for all platforms.

name: Release

on:
  push:
    tags:
      - 'v*'
  # Allow manually re-running the workflow without retagging.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and draft release (${{ matrix.platform.label }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Apple Silicon (M-series). The vast majority of new Macs.
          - {
              os: macos-latest,
              label: macOS arm64,
              # `app` creates the .app.tar.gz updater payload; `dmg` is the
              # human installer. Both are required for macOS parity.
              args: '--target aarch64-apple-darwin --bundles app,dmg',
              rustTargets: aarch64-apple-darwin
            }
          # Intel. Older Macs still ship updates.
          - {
              os: macos-latest,
              label: macOS x64,
              # `app` creates the .app.tar.gz updater payload; `dmg` is the
              # human installer. Both are required for macOS parity.
              args: '--target x86_64-apple-darwin --bundles app,dmg',
              rustTargets: x86_64-apple-darwin
            }
          # Windows x64. Produces the NSIS setup executable.
          - {
              os: windows-latest,
              label: Windows x64,
              args: '--target x86_64-pc-windows-msvc --bundles nsis',
              rustTargets: x86_64-pc-windows-msvc
            }
          # Linux x64. Produces the AppImage.
          - {
              os: ubuntu-latest,
              label: Linux x64,
              args: '--target x86_64-unknown-linux-gnu --bundles appimage',
              rustTargets: x86_64-unknown-linux-gnu
            }

    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          # Pin to the version used in development. Bump in lockstep with
          # `package.json#packageManager` if/when that field is added.
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          # Node 22 (current active LTS). Node 20 is deprecated on the
          # GitHub Actions runners as of mid-2026; the action versions
          # above are the first ones that ship a Node 24 runtime so this
          # workflow no longer prints the deprecation banner.
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rustTargets }}

      - name: Cache cargo build artefacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, sign, and draft release
        uses: tauri-apps/tauri-action@v0
        env:
          # Signs the updater payload. tauri-action expands these env vars
          # into the `--private-key` and `--private-key-password` flags it
          # passes to the bundler.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Required for the action to talk to the GitHub Releases API.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Markdown v__VERSION__'
          releaseBody: |
            See attached assets to install. The signed updater payloads and
            `latest.json` together feed the in-app auto-update path on
            machines already running v0.0.16 or later.
          # Stay in draft until a human clicks Publish — guards against
          # a stray tag turning into a public release.
          releaseDraft: true
          prerelease: false
          # If Windows ever adds MSI back alongside NSIS, keep the updater on
          # the normal setup executable rather than the MSI payload.
          updaterJsonPreferNsis: true
          releaseAssetNamePattern: 'Markdown_[version]_[platform]_[arch][setup][ext]'
          args: ${{ matrix.platform.args }}
